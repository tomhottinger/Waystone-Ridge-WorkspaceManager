<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  display: flex; flex-direction: column;
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: {FONT_SIZE}px;
  color: #111; background: #fff;
}

#titlebar {
  display: flex; justify-content: space-between; align-items: center;
  height: 32px; padding: 0 14px; flex-shrink: 0;
  background: #f3f3f3; border-bottom: 1px solid #e0e0e0;
  user-select: none;
}
#titlebar .title-group { display: flex; align-items: center; }
#titlebar .logo {
  width: 18px; height: 18px; margin-right: 9px;
  stroke: #0078d4; display: block;
}
#titlebar .title { font-size: 12px; font-weight: 400; color: #555; }
#titlebar .title strong { font-weight: 600; color: #000; }
#titlebar .credits { font-size: 10px; color: #777; letter-spacing: 0.3px; }

#toolbar {
  display: flex; gap: 4px; padding: 5px 8px;
  background: #f4f4f4; border-bottom: 1px solid #d8d8d8;
  flex-shrink: 0; flex-wrap: wrap;
}
.tb-btn {
  padding: 2px 9px; border: 1px solid #bbb; border-radius: 3px;
  background: #fff; cursor: pointer; font-size: 12px;
  font-family: inherit; line-height: 1.5; user-select: none;
}
.tb-btn:hover { background: #e8e8e8; }
.tb-sep { width: 1px; background: #ccc; margin: 2px 3px; align-self: stretch; }

#export-wrap { position: relative; margin-left: auto; }
#export-btn { letter-spacing: 1px; }
#export-menu {
  display: none; position: absolute; right: 0; top: calc(100% + 3px);
  background: #fff; border: 1px solid #ccc; border-radius: 4px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15); z-index: 200; min-width: 170px;
  padding: 3px 0;
}
#export-menu.open { display: block; }
.menu-item {
  padding: 7px 14px; cursor: pointer; font-size: 12px; font-family: inherit;
  white-space: nowrap; color: #111;
}
.menu-item:hover { background: #f0f4ff; }

#doc { flex: 1; overflow-y: auto; padding: 14px 22px; cursor: text; }

.block { border-radius: 3px; padding: 2px 5px; margin-bottom: 5px; min-height: 1.5em; }
.block:not(.editing):hover { background: rgba(0,0,0,.04); }
.block.editing textarea,
#new-zone.editing textarea {
  width: 100%; border: 1px solid #b8d4ff; border-radius: 3px; outline: none;
  background: #fafcff; padding: 5px 7px;
  font-family: 'Cascadia Code','Consolas','Courier New',monospace;
  font-size: {FONT_SIZE}px; color: #1a1a1a; line-height: 1.6;
  resize: none; display: block; overflow: hidden; min-height: 1.8em;
}

#new-zone { min-height: 64px; padding: 2px 5px; }
#placeholder { color: #bbb; font-style: italic; padding: 2px 5px; }

.block h1 { font-size:1.65em; font-weight:700; margin:.2em 0 .15em; padding-bottom:.2em; border-bottom:1px solid #e4e4e4; }
.block h2 { font-size:1.3em; font-weight:600; margin:.3em 0 .15em; }
.block h3 { font-size:1.1em; font-weight:600; margin:.2em 0 .1em; }
.block h4,.block h5,.block h6 { font-size:1em; font-weight:600; margin:.15em 0 .1em; }
.block p { margin:.15em 0; line-height:1.65; }
.block ul,.block ol { margin:.1em 0 .1em 1.4em; }
.block li { line-height:1.6; }
.block code { background:#f0f0f0; padding:1px 5px; border-radius:3px; font-size:.88em; font-family:'Cascadia Code','Consolas',monospace; }
.block pre { background:#f4f4f4; border-radius:5px; padding:10px 13px; overflow-x:auto; border:1px solid #e4e4e4; }
.block pre code { background:none; padding:0; font-size:.9em; }
.block blockquote { border-left:3px solid #bbb; padding-left:12px; color:#555; margin:.1em 0 .1em .2em; }
.block strong { font-weight:700; }
.block em { font-style:italic; }
.block del { text-decoration:line-through; color:#888; }
.block hr { border:none; border-top:1px solid #ddd; margin:.3em 0; }
.block a { color:#0066cc; text-decoration:none; }
.block a:hover { text-decoration:underline; }
.block table { border-collapse:collapse; margin:.2em 0; }
.block th,.block td { border:1px solid #d0d0d0; padding:3px 9px; }
.block th { background:#f4f4f4; font-weight:600; text-align:left; }
</style>
</head>
<body>

<div id="titlebar">
  <div class="title-group">
    <svg class="logo" viewBox="0 0 24 24" fill="none" stroke-width="2">
      <path d="M3 20l5-9 4 6 5-12 4 15" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="title">Waystone <strong>Ridge</strong></span>
  </div>
  <span class="credits">by Thomas Hottinger &ndash; artScape cybernetics</span>
</div>

<div id="toolbar" onmousedown="event.preventDefault()">
  <button class="tb-btn" onclick="wrapA('**','**')" title="Fett (Ctrl+B)"><b>B</b></button>
  <button class="tb-btn" onclick="wrapA('*','*')"   title="Kursiv (Ctrl+I)"><i>I</i></button>
  <button class="tb-btn" onclick="wrapA('~~','~~')" title="Durchgestrichen"><s>S</s></button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="wrapA('`','`')"          title="Inline-Code (Ctrl+K)">Code</button>
  <button class="tb-btn" onclick="blockA('```\n','\n```')" title="Code-Block">```</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="prefA('# ')"   title="Überschrift 1">H1</button>
  <button class="tb-btn" onclick="prefA('## ')"  title="Überschrift 2">H2</button>
  <button class="tb-btn" onclick="prefA('### ')" title="Überschrift 3">H3</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="prefA('- ')"  title="Liste">•</button>
  <button class="tb-btn" onclick="prefA('1. ')" title="Nummerierte Liste">1.</button>
  <button class="tb-btn" onclick="prefA('> ')"  title="Zitat">&gt;</button>
  <div id="export-wrap">
    <button class="tb-btn" id="export-btn" title="Exportieren" onclick="toggleExportMenu()">…</button>
    <div id="export-menu">
      <div class="menu-item" onclick="copyMarkdown()">Markdown kopieren</div>
      <div class="menu-item" onclick="saveAsMarkdown()">Speichern als …</div>
    </div>
  </div>
</div>
<div id="doc"></div>

<script>
(function () {
'use strict';

// ── Zustand ───────────────────────────────────────────────────────────────────

var text = '';
var editingIdx = null;   // null | Zahl | 'new'

// Fester Kontext des aktiven Blocks: before/after bleiben während des Edits unveränderlich.
// Das verhindert Duplikationen, weil syncNow nie splitBlocks auf sich selbst aufruft.
var editCtx = null;  // { before: string, after: string }

// Unterdrückt den focusout-Handler während programmatischer render()-Aufrufe,
// weil doc.innerHTML='' die aktive Textarea aus dem DOM entfernt und dabei
// synchron focusout mit relatedTarget=null auslöst.
var rendering = false;

var doc = document.getElementById('doc');

// ── Markdown-Parser ───────────────────────────────────────────────────────────

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function inlineMd(raw) {
  var codes = [];
  var s = raw.replace(/`([^`]+)`/g, function(_,c){ codes.push(esc(c)); return '\x00'+(codes.length-1)+'\x00'; });
  s = esc(s);
  s = s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  s = s.replace(/___(.+?)___/g,       '<strong><em>$1</em></strong>');
  s = s.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
  s = s.replace(/__(.+?)__/g,         '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g,         '<em>$1</em>');
  s = s.replace(/_([^\s].*?[^\s])_/g, '<em>$1</em>');
  s = s.replace(/~~(.+?)~~/g,         '<del>$1</del>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  s = s.replace(/\x00(\d+)\x00/g, function(_,i){ return '<code>'+codes[+i]+'</code>'; });
  return s;
}
function parseMd(src) {
  var lines=src.split('\n'), out=[], i=0;
  var inFence=false, fLang='', fLines=[];
  var inUl=false, inOl=false, inP=false;
  var tRows=[], tBody=false;
  function fP()  { if(inP)  { out.push('</p>');  inP=false; } }
  function fUl() { if(inUl) { out.push('</ul>'); inUl=false; } }
  function fOl() { if(inOl) { out.push('</ol>'); inOl=false; } }
  function fT()  {
    if(!tRows.length) return;
    out.push('<table>');
    tRows.forEach(function(r){ out.push(r); });
    if(tBody){ out.push('</tbody>'); tBody=false; }
    out.push('</table>'); tRows=[];
  }
  function fB() { fP(); fUl(); fOl(); fT(); }
  while(i < lines.length) {
    var line = lines[i++];
    if(/^```/.test(line)){
      if(inFence){ out.push('<pre><code'+(fLang?' class="language-'+esc(fLang)+'"':'')+'>'+esc(fLines.join('\n'))+'</code></pre>'); inFence=false; fLines=[]; fLang=''; }
      else{ fB(); inFence=true; fLang=line.slice(3).trim(); }
      continue;
    }
    if(inFence){ fLines.push(line); continue; }
    if(!line.trim()){ fB(); continue; }
    var hm=line.match(/^(#{1,6})\s+(.*)/);
    if(hm){ fB(); out.push('<h'+hm[1].length+'>'+inlineMd(hm[2])+'</h'+hm[1].length+'>'); continue; }
    if(/^([-*_])\1\1+\s*$/.test(line.trim())){ fB(); out.push('<hr>'); continue; }
    if(/^>\s?/.test(line)){ fB(); out.push('<blockquote>'+inlineMd(line.replace(/^>\s?/,''))+'</blockquote>'); continue; }
    if(/^\|/.test(line)){
      if(/^\|[-| :]+\|$/.test(line.trim())){
        if(tRows.length===1){ tRows[0]=tRows[0].replace(/<td>/g,'<th>').replace(/<\/td>/g,'</th>').replace('<tr>','<thead><tr>').replace('</tr>','</tr></thead><tbody>'); tBody=true; }
        continue;
      }
      fP(); fUl(); fOl();
      tRows.push('<tr>'+line.split('|').slice(1,-1).map(function(c){ return '<td>'+inlineMd(c.trim())+'</td>'; }).join('')+'</tr>');
      continue;
    }
    if(tRows.length) fT();
    var ulm=line.match(/^[-*+]\s+(.*)/);
    if(ulm){ fP(); if(!inUl){fOl();out.push('<ul>');inUl=true;} out.push('<li>'+inlineMd(ulm[1])+'</li>'); continue; }
    var olm=line.match(/^\d+\.\s+(.*)/);
    if(olm){ fP(); if(!inOl){fUl();out.push('<ol>');inOl=true;} out.push('<li>'+inlineMd(olm[1])+'</li>'); continue; }
    fUl(); fOl();
    if(!inP){ out.push('<p>'); inP=true; } else { out.push('<br>'); }
    out.push(inlineMd(line));
  }
  fB();
  if(inFence && fLines.length) out.push('<pre><code>'+esc(fLines.join('\n'))+'</code></pre>');
  return out.join('');
}

// ── Block-Verwaltung ──────────────────────────────────────────────────────────

function splitBlocks(src) {
  var lines=src.split('\n'), blocks=[], start=null, fence=false;
  for(var i=0; i<lines.length; i++){
    if(/^`{3}/.test(lines[i])) fence=!fence;
    if(!fence && lines[i].trim()===''){
      if(start!==null){ blocks.push({raw:lines.slice(start,i).join('\n'), s:start, e:i-1}); start=null; }
    } else {
      if(start===null) start=i;
    }
  }
  if(start!==null) blocks.push({raw:lines.slice(start).join('\n'), s:start, e:lines.length-1});
  return blocks;
}

// Rekonstruiert text aus editCtx + neuem Inhalt
function rebuildText(content) {
  if(!editCtx) return;
  var parts = [editCtx.before, content, editCtx.after].filter(function(s){ return s.trim(); });
  text = parts.join('\n\n').replace(/\n{3,}/g, '\n\n');
}

// Aktiviert einen Block und setzt editCtx (einmalig bei Beginn des Edits)
function activateBlock(idx) {
  if(idx === 'new') {
    editCtx = { before: text.trimEnd(), after: '' };
  } else {
    var blocks = splitBlocks(text);
    var b = blocks[idx];
    if(!b){ activateBlock('new'); return; }
    var lines = text.split('\n');
    editCtx = {
      before: lines.slice(0, b.s).join('\n'),
      after:  lines.slice(b.e + 1).join('\n')
    };
  }
  editingIdx = idx;
}

// Sofort-Sync bei jedem Tastendruck (kein Duplikationsrisiko wegen festem editCtx)
function syncNow() {
  var ta = curTa();
  if(ta && editCtx !== null) rebuildText(ta.value);
}

// Committet und schliesst den Edit-Modus
function commitAll() {
  var ta = curTa();
  if(ta && editCtx !== null) rebuildText(ta.value);
  editCtx = null;
  editingIdx = null;
}

// Wechsel zu einem anderen Block
function switchTo(idx) {
  commitAll();
  activateBlock(idx);
  render();
}

// ── DOM-Rendering ─────────────────────────────────────────────────────────────

function render() {
  rendering = true;
  var scrollTop = doc.scrollTop;
  doc.innerHTML = '';
  var blocks = splitBlocks(text);

  if(!blocks.length && editingIdx !== 'new') {
    var ph = mk('div', {id:'placeholder'});
    ph.textContent = 'Klicken zum Schreiben …';
    ph.onmousedown = function(e){ e.preventDefault(); switchTo('new'); };
    doc.appendChild(ph);
  }

  blocks.forEach(function(b, idx) {
    var div = mk('div', {className: idx===editingIdx ? 'block editing' : 'block'});
    div.dataset.idx = idx;
    if(idx === editingIdx) {
      div.appendChild(mkTa(b.raw));
    } else {
      div.innerHTML = parseMd(b.raw);
      div.onmousedown = function(e) {
        var ci = +this.dataset.idx;
        if(ci === editingIdx) return;
        e.preventDefault();
        switchTo(ci);
      };
    }
    doc.appendChild(div);
  });

  var nz = mk('div', {id:'new-zone', className: editingIdx==='new' ? 'editing' : ''});
  if(editingIdx === 'new') {
    nz.appendChild(mkTa(''));
  } else {
    nz.onmousedown = function(e){ e.preventDefault(); switchTo('new'); };
  }
  doc.appendChild(nz);
  doc.scrollTop = scrollTop;

  rendering = false;
  var ta = curTa();
  if(ta) {
    ta.focus();
    if(editingIdx !== 'new') ta.setSelectionRange(ta.value.length, ta.value.length);
    autoH(ta);
  }
}

function mkTa(val) {
  var ta = mk('textarea');
  ta.value = val;
  ta.oninput  = function(){ autoH(this); syncNow(); };
  ta.onkeydown = onKey;
  return ta;
}

// ── Fokus-Verlust ─────────────────────────────────────────────────────────────

doc.addEventListener('focusout', function(e) {
  if(rendering) return;
  if(doc.contains(e.relatedTarget)) return;
  if(e.target.tagName !== 'TEXTAREA') return;
  commitAll();
  render();
});

// ── Tastatur ─────────────────────────────────────────────────────────────────

function onKey(e) {
  if(e.key==='F5' || (e.ctrlKey && e.key==='r')){ e.preventDefault(); return; }

  // ESC: Fenster schliessen
  if(e.key === 'Escape') {
    e.preventDefault();
    commitAll(); render();
    window.ipc.postMessage('close');
    return;
  }

  // Ctrl+Enter: neuen Block direkt nach dem aktuellen anlegen
  if(e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    var content = this.value.trimEnd();
    // Aktuellen Inhalt in "before" verschieben, neuer Block kommt danach
    var newBefore = editCtx && editCtx.before.trim()
      ? editCtx.before.trim() + '\n\n' + content
      : content;
    text = [newBefore, editCtx ? editCtx.after : ''].filter(function(s){ return s.trim(); }).join('\n\n');
    editCtx = { before: newBefore.trimEnd(), after: editCtx ? editCtx.after : '' };
    editingIdx = 'new';
    render();
    return;
  }

  // Alt+↓ / Alt+↑: zwischen Blöcken navigieren
  if(e.altKey && (e.key==='ArrowDown' || e.key==='ArrowUp')) {
    e.preventDefault();
    var prevIdx = editingIdx;
    commitAll();
    var blocks = splitBlocks(text);
    var n = blocks.length;
    var target;
    if(e.key === 'ArrowDown') {
      target = (typeof prevIdx === 'number') ? prevIdx + 1 : n;
      if(target >= n) target = 'new';
    } else {
      target = (typeof prevIdx === 'number') ? prevIdx - 1 : n - 1;
      if(typeof target === 'number' && target < 0) target = 0;
    }
    activateBlock(target);
    render();
    return;
  }

  if(e.key === 'Tab'){ e.preventDefault(); inAt(this, this.selectionStart, '  '); return; }
  if(e.ctrlKey) {
    if(e.key==='b'||e.key==='B'){ e.preventDefault(); wrapT(this,'**','**'); }
    if(e.key==='i'||e.key==='I'){ e.preventDefault(); wrapT(this,'*','*'); }
    if(e.key==='k'||e.key==='K'){ e.preventDefault(); wrapT(this,'`','`'); }
  }
}

// ── Hilfsfunktionen ───────────────────────────────────────────────────────────

function mk(tag, props) {
  var e = document.createElement(tag);
  if(props) Object.keys(props).forEach(function(k){ e[k]=props[k]; });
  return e;
}
function autoH(ta) { ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; }
function curTa()   { return doc.querySelector('textarea'); }

function inAt(ta, pos, s) {
  var end = ta.selectionEnd;
  ta.value = ta.value.slice(0,pos)+s+ta.value.slice(end);
  ta.selectionStart = ta.selectionEnd = pos+s.length;
  autoH(ta);
}
function wrapT(ta, b, a) {
  var s=ta.selectionStart, e=ta.selectionEnd, sel=ta.value.slice(s,e);
  ta.value = ta.value.slice(0,s)+b+sel+a+ta.value.slice(e);
  ta.selectionStart=s+b.length; ta.selectionEnd=e+b.length;
}

function wrapA(b,a) { var ta=curTa(); if(ta){ wrapT(ta,b,a); ta.focus(); } }
function blockA(b,a){
  var ta=curTa(); if(!ta) return;
  var s=ta.selectionStart, e=ta.selectionEnd, sel=ta.value.slice(s,e);
  ta.value=ta.value.slice(0,s)+b+sel+a+ta.value.slice(e);
  ta.selectionStart=s+b.length; ta.selectionEnd=s+b.length+sel.length;
  autoH(ta); ta.focus();
}
function prefA(p) {
  var ta=curTa(); if(!ta) return;
  var s=ta.selectionStart, ls=ta.value.lastIndexOf('\n',s-1)+1;
  ta.value=ta.value.slice(0,ls)+p+ta.value.slice(ls);
  ta.selectionStart=ta.selectionEnd=s+p.length;
  autoH(ta); ta.focus();
}

// ── Export-Menü ───────────────────────────────────────────────────────────────

function toggleExportMenu() {
  document.getElementById('export-menu').classList.toggle('open');
}
function closeExportMenu() {
  document.getElementById('export-menu').classList.remove('open');
}

// Klick ausserhalb schliesst das Menü
document.addEventListener('mousedown', function(e) {
  var wrap = document.getElementById('export-wrap');
  if(wrap && !wrap.contains(e.target)) closeExportMenu();
});

function flashBtn(msg) {
  var btn = document.getElementById('export-btn');
  var orig = btn.textContent;
  btn.textContent = msg;
  setTimeout(function(){ btn.textContent = orig; }, 1200);
}

function copyMarkdown() {
  closeExportMenu();
  var ta = mk('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;width:1px;height:1px;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var t = curTa(); if(t) t.focus();
  flashBtn('✓');
}


function saveAsMarkdown() {
  closeExportMenu();
  window.ipc.postMessage('save\n' + text);
}

// ── Globale Exports (für inline onclick-Attribute) ────────────────────────────
// Alle Funktionen leben im IIFE; inline-onclick sucht im window-Scope.

window.wrapA            = wrapA;
window.blockA           = blockA;
window.prefA            = prefA;
window.toggleExportMenu = toggleExportMenu;
window.copyMarkdown     = copyMarkdown;
window.saveAsMarkdown   = saveAsMarkdown;

// ── API für Rust ──────────────────────────────────────────────────────────────

window.wysiwyg = {
  show: function() {
    commitAll();
    var blocks = splitBlocks(text);
    if(blocks.length > 0) {
      activateBlock(blocks.length - 1);
    } else {
      activateBlock('new');
    }
    render();
    var ta = curTa();
    if(ta) ta.scrollIntoView({ block: 'nearest' });
    // Verzögerter Fokus als Backup: WM_SETFOCUS leitet Win32-Fokus ans WebView2-Child
    // weiter, aber der Browser benötigt ggf. einen Tick bis das DOM-Fokus-System bereit ist.
    setTimeout(function() { var t = curTa(); if(t) t.focus(); }, 50);
  }
};

// ── Init ─────────────────────────────────────────────────────────────────────
render();

})();
</script>
</body>
</html>
