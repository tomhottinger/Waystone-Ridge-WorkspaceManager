# =============================================================================
# Waystone Ridge – Workspace Manager
# Konfiguration
# =============================================================================
#
# Diese Datei wird beim ersten Start automatisch neben der EXE erzeugt.
# Sie zeigt alle verfügbaren Optionen mit Erklärungen und kann frei angepasst werden.
# Mit --config <Pfad> kann auch ein anderer Pfad angegeben werden.
#
# Tray-Icon → Konfiguration:
#   "Konfigurationsfile öffnen"  – öffnet diese Datei im Standard-Texteditor
#   "neu einlesen"               – lädt die Konfiguration sofort neu (kein Neustart)


# -----------------------------------------------------------------------------
# Globale Optionen
# (müssen VOR den [[workspaces]]-Blöcken stehen)
# -----------------------------------------------------------------------------

# Permanentes Desktop-Overlay ein-/ausschalten.
# Zeigt den Namen des aktuellen Workspace in einer Bildschirmecke.
# Ohne diesen Eintrag (oder mit false) startet kein Overlay-Fenster.
show_overlay = false

# Position, an der das Overlay angezeigt wird.
# Erlaubte Werte:
#   "top_left"     "top_center"     "top_right"
#   "bottom_left"  "bottom_center"  "bottom_right"
# Standard: "bottom_right"
overlay_corner = "top_right"

# Verhalten beim Verschieben eines Fensters mit move_window_hotkey:
#   true  – nach dem Verschieben in den Zielworkspace wechseln (Standard)
#   false – auf dem aktuellen Workspace bleiben; das Fenster verschwindet
#           sofort aus der Ansicht und ist auf dem Zielworkspace verfügbar
move_window_follow = true

# Markdown-Schnellnotiz: randloses, immer-oben Fenster mit WebView2-Block-Editor.
# Typora-ähnlich: Blöcke werden gerendert; der aktive Block zeigt Markdown-Quelltext.
# Ctrl+Enter legt einen neuen Block an, Alt+↓/↑ navigiert zwischen Blöcken.
# ESC oder Fokusverlust blendet das Fenster aus und gibt den Fokus zurück.
# Voraussetzung: WebView2-Runtime (auf Windows 10/11 vorinstalliert via Edge).
# Ohne diesen Eintrag ist die Funktion deaktiviert.
# quick_input_hotkey = "Ctrl+s"
#
# Fenstergröße in Prozent der Bildschirmmaße (erlaubte Werte: 5–95):
# quick_input_width_pct  = 40   # Standard: 40 % der Bildschirmbreite
# quick_input_height_pct = 30   # Standard: 30 % der Bildschirmhöhe
#
# Schriftgröße in Punkt (0 = 14 px Standard):
# quick_input_font_size  = 0    # Beispiel: 14 für 14-Punkt-Schrift


# -----------------------------------------------------------------------------
# Respite – Zeitgesteuerte Eingabesperre
# Definiert Zeitfenster, in denen Maus und Tastatur vollständig gesperrt sind.
# Kein [[respite]]-Block = Respite deaktiviert.
#
# Felder pro [[respite]]-Block:
#   label – Anzeigename im Overlay während der Sperre (Standard: "Pause")
#   days  – Wochentage (Mehrfachauswahl möglich):
#             Englisch: "Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"
#             Deutsch:  "Montag" … "Sonntag" oder Kürzel "Mo" … "So"
#   start – Beginn der Sperre im Format "HH:MM"
#   end   – Ende der Sperre im Format "HH:MM"
#
# Während der Sperre zeigt ein großes Overlay den Pausennamen und einen
# Countdown der verbleibenden Zeit.
#
# Mehrere Pausen: einfach mehrere [[respite]]-Blöcke untereinander schreiben.
# Jeder Block ist unabhängig; bei Überschneidungen gilt der erste passende Block.
#
# Notausgang – zwei Stufen:
#   1. Mindestwartezeit muss ablaufen (respite_min_wait_secs, Standard: 6 Minuten).
#      Während der Wartezeit ist kein Abbruch möglich.
#   2. Danach muss eine zufällige Zeichensequenz vollständig abgetippt werden
#      (respite_escape_len Zeichen, a–z und 0–9).
#      Falsches Zeichen → Eingabe beginnt von vorne.
#      Korrekte Sequenz → Sperre endet für den Rest des Zeitfensters.
#
# Breakout-Einstellungen – globale Defaults (können pro [[respite]]-Block
# überschrieben werden mit min_wait_secs und escape_len direkt im Block):
#
# [respite_breakout]
# min_wait_secs = 360   # Sekunden warten bevor Breakout verfügbar (Standard: 360 = 6 Min)
#                       # 0 = sofort verfügbar (kein Pflicht-Warten)
# escape_len    = 12    # Länge der abzutippenden Zeichensequenz (Standard: 12, Min: 1)
# -----------------------------------------------------------------------------

[respite_breakout]
min_wait_secs = 60   # nur 10 Sekunden warten (zum Testen)
escape_len    = 12    # kurze Sequenz (zum Testen)


# Morgendliche Bildschirmpause – Mo bis Fr
# [[respite]]
# label = "Morgenrunde"
# days  = ["Mon", "Tue", "Wed", "Thu", "Fri"]
# start = "09:00"
# end   = "09:05"

# Mittagspause – Mo bis Fr (überschreibt globale Breakout-Werte für diesen Block)
# [[respite]]
# label         = "Mittagspause"
# days          = ["Mon", "Tue", "Wed", "Thu", "Fri"]
# start         = "12:00"
# end           = "12:15"
# min_wait_secs = 600   # 10 Minuten Pflicht-Warten (Overrride)
# escape_len    = 20    # lange Sequenz (Overrride)

# Nachmittagspause – Mo bis Do (deutsche Kürzel funktionieren auch)
# [[respite]]
# label = "Nachmittagspause"
# days  = ["Mo", "Di", "Mi", "Do"]
# start = "15:30"
# end   = "15:45"

# Freitags-Ausklang – nur Freitags, etwas früher
# [[respite]]
# label = "Freitags-Pause"
# days  = ["Fr"]
# start = "15:00"
# end   = "15:10"


# -----------------------------------------------------------------------------
# Summon-Hotkeys
# Ein Fenster per Fenstertitel auf den aktuellen Workspace holen.
# Beliebig viele [[summons]]-Blöcke möglich (oder keiner).
#
# Felder:
#   hotkey     – Hotkey-Format wie bei Workspaces ("Win+F1", "Ctrl+Alt+S", …)
#   title      – Teilstring des Fenstertitels; Groß-/Kleinschreibung egal
#   launch     – (optional) Kommandozeile, die gestartet wird, wenn kein
#                passendes Fenster gefunden wird; %ENVVAR%-Variablen werden
#                von cmd.exe expandiert
#   launch_dir – (optional) Arbeitsverzeichnis für den gestarteten Prozess
#
# Verhalten:
#   Fenster gefunden, auf aktuellem Workspace und im Vordergrund
#     → Fenster wird minimiert (Toggle-Funktion)
#   Fenster gefunden, aber nicht auf aktuellem Workspace oder nicht im Vordergrund
#     → Fenster wird auf den aktuellen Workspace geholt und in den Vordergrund gebracht
#   Fenster nicht gefunden, launch definiert
#     → Programm wird gestartet
#   Fenster nicht gefunden, kein launch
#     → nichts passiert (Meldung im Log bei --debug)
# -----------------------------------------------------------------------------

# Einfacher Summon ohne launch-Fallback:
[[summons]]
hotkey = "Win+F1"
title  = "Outlook"

# Summon mit launch-Fallback (Programm starten falls kein Fenster gefunden):
[[summons]]
hotkey = "Win+F2"
title  = "Slack"
launch = "slack.exe"

# Summon mit launch und Arbeitsverzeichnis; Anführungszeichen mit \" escapen:
[[summons]]
hotkey     = "Win+F3"
title      = "Tom's Console"
launch     = "%LOCALAPPDATA%\\Microsoft\\WindowsApps\\wt.exe -p \"Tom's Console\""
launch_dir = "C:\\dev"


# -----------------------------------------------------------------------------
# Workspaces
# Jeder Workspace wird als eigener [[workspaces]]-Block definiert.
# -----------------------------------------------------------------------------
#
# Felder:
#   id                 – eindeutige Zahl (Pflichtfeld)
#   name               – Anzeigename im Overlay und Tray-Menü (Pflichtfeld)
#   activate_hotkey    – Hotkey zum Wechseln auf diesen Workspace
#   move_window_hotkey – Hotkey, um das aktive Fenster in diesen Workspace zu verschieben
#   assigned_monitors  – reserviert für spätere Versionen, kann leer bleiben
#
# Hotkey-Format: "Mod+Mod+Taste"
# Modifier: Win, Ctrl, Alt, Shift  (auch Strg, Umschalt als Alias)
# Tasten:    0–9, A–Z, F1–F24
#            Space, Escape/Esc, Tab, Return/Enter, Backspace
#            Delete/Del/Entf, Insert/Ins/Einfg, Home/Pos1, End/Ende
#            PageUp/PgUp/Bildauf, PageDown/PgDn/Bildab
#            Left/Links, Right/Rechts, Up/Oben, Down/Unten
# Beispiele: "Win+1", "Ctrl+Alt+F2", "Win+Shift+3", "Ctrl+Space", "Alt+Left"
# Hinweis:   Win+Space ist von Windows für die Sprachauswahl reserviert und
#            kann nicht zuverlässig als Hotkey verwendet werden.

[[workspaces]]
id = 1
name = "Entwicklung"
activate_hotkey = "Win+1"
move_window_hotkey = "Win+Shift+1"

[[workspaces]]
id = 2
name = "Browser"
activate_hotkey = "Win+2"
move_window_hotkey = "Win+Shift+2"

[[workspaces]]
id = 3
name = "Kommunikation"
activate_hotkey = "Win+3"
move_window_hotkey = "Win+Shift+3"

[[workspaces]]
id = 4
name = "Dokumente"
activate_hotkey = "Win+4"
move_window_hotkey = "Win+Shift+4"

[[workspaces]]
id = 5
name = "Diverses"
activate_hotkey = "Win+5"
move_window_hotkey = "Win+Shift+5"

[[workspaces]]
id = 6
name = "Diverses"
activate_hotkey = "Win+6"
move_window_hotkey = "Win+Shift+6"


[[workspaces]]
id = 7
name = "Diverses"
