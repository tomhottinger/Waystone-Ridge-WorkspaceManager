# =============================================================================
# Waystone Ridge – Workspace Manager
# Beispielkonfiguration
# =============================================================================
#
# Diese Datei zeigt alle verfügbaren Optionen mit Erklärungen.
# Zum Aktivieren: Datei als "config.toml" neben die .exe legen.
# Mit --config <Pfad> kann auch ein anderer Pfad angegeben werden.


# -----------------------------------------------------------------------------
# Globale Optionen
# (müssen VOR den [[workspaces]]-Blöcken stehen)
# -----------------------------------------------------------------------------

# Permanentes Desktop-Overlay ein-/ausschalten.
# Zeigt den Namen des aktuellen Workspace in einer Bildschirmecke.
# Ohne diesen Eintrag (oder mit false) startet kein Overlay-Fenster.
show_overlay = true

# Position, an der das Overlay angezeigt wird.
# Erlaubte Werte:
#   "top_left"     "top_center"     "top_right"
#   "bottom_left"  "bottom_center"  "bottom_right"
# Standard: "bottom_right"
overlay_corner = "top_right"

# Verhalten beim Verschieben eines Fensters mit move_window_hotkey:
#   true  – nach dem Verschieben in den Zielworkspace wechseln (Standard)
#   false – auf dem aktuellen Workspace bleiben; das Fenster verschwindet
#           sofort aus der Ansicht und ist auf dem Zielworkspace verfügbar
move_window_follow = true


# -----------------------------------------------------------------------------
# Summon-Hotkeys
# Ein Fenster per Fenstertitel auf den aktuellen Workspace holen.
# Beliebig viele [[summons]]-Blöcke möglich (oder keiner).
#
# Felder:
#   hotkey     – Hotkey-Format wie bei Workspaces ("Win+F1", "Ctrl+Alt+S", …)
#   title      – Teilstring des Fenstertitels; Groß-/Kleinschreibung egal
#   launch     – (optional) Kommandozeile, die gestartet wird, wenn kein
#                passendes Fenster gefunden wird; %ENVVAR%-Variablen werden
#                von cmd.exe expandiert
#   launch_dir – (optional) Arbeitsverzeichnis für den gestarteten Prozess
#
# Verhalten:
#   Fenster gefunden, auf aktuellem Workspace und im Vordergrund
#     → Fenster wird minimiert (Toggle-Funktion)
#   Fenster gefunden, aber nicht auf aktuellem Workspace oder nicht im Vordergrund
#     → Fenster wird auf den aktuellen Workspace geholt und in den Vordergrund gebracht
#   Fenster nicht gefunden, launch definiert
#     → Programm wird gestartet
#   Fenster nicht gefunden, kein launch
#     → nichts passiert (Meldung im Log bei --debug)
# -----------------------------------------------------------------------------

# Einfacher Summon ohne launch-Fallback:
[[summons]]
hotkey = "Win+F1"
title  = "Outlook"

# Summon mit launch-Fallback (Programm starten falls kein Fenster gefunden):
[[summons]]
hotkey = "Win+F2"
title  = "Slack"
launch = "slack.exe"

# Summon mit launch und Arbeitsverzeichnis; Anführungszeichen mit \" escapen:
[[summons]]
hotkey     = "Win+F3"
title      = "Tom's Console"
launch     = "%LOCALAPPDATA%\\Microsoft\\WindowsApps\\wt.exe -p \"Tom's Console\""
launch_dir = "C:\\dev"


# -----------------------------------------------------------------------------
# Workspaces
# Jeder Workspace wird als eigener [[workspaces]]-Block definiert.
# -----------------------------------------------------------------------------
#
# Felder:
#   id                 – eindeutige Zahl (Pflichtfeld)
#   name               – Anzeigename im Overlay und Tray-Menü (Pflichtfeld)
#   activate_hotkey    – Hotkey zum Wechseln auf diesen Workspace
#   move_window_hotkey – Hotkey, um das aktive Fenster in diesen Workspace zu verschieben
#   assigned_monitors  – reserviert für spätere Versionen, kann leer bleiben
#
# Hotkey-Format: "Mod+Mod+Taste"
# Modifier: Win, Ctrl, Alt, Shift  (auch Strg, Umschalt als Alias)
# Tasten:    0–9, A–Z, F1–F24
# Beispiele: "Win+1", "Ctrl+Alt+F2", "Win+Shift+3"

[[workspaces]]
id = 1
name = "Entwicklung"
activate_hotkey = "Win+1"
move_window_hotkey = "Win+Shift+1"

[[workspaces]]
id = 2
name = "Browser"
activate_hotkey = "Win+2"
move_window_hotkey = "Win+Shift+2"

[[workspaces]]
id = 3
name = "Kommunikation"
activate_hotkey = "Win+3"
move_window_hotkey = "Win+Shift+3"

[[workspaces]]
id = 4
name = "Dokumente"
activate_hotkey = "Win+4"
move_window_hotkey = "Win+Shift+4"

[[workspaces]]
id = 5
name = "Diverses"
activate_hotkey = "Win+5"
move_window_hotkey = "Win+Shift+5"
